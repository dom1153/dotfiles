# See https://wiki.hyprland.org/Configuring/Monitors/
# # monitor=name,resolution,position,scale
# # hyprctl monitors all
monitor=,preferred,auto,auto

# # GIGA-BYTE
# # comma issue fixed in latest git , v0.3.8
# # GIGA-BYTE M27Q, but commas causes syntax error. Fixed in v0.3.8 via shortdesc
monitor=DP-1, 2560x1440@170, -0x770, 1

# # LG SDQHD 208NTBK6R077
monitor=desc:LG SDQHD 208NTBK6R077, 2560x2880@60, 2560x0, 1

# # disable works if used with the right dispatch name (DP != desc)
# monitor=DP-2,disable
# exec-once = hyprctl dispatch dpms off DP-2

# # T460 sei-asagiri
monitor=desc:Chimei Innolux Corporation 0x14C9, 1920x1080@60, 0x0,1

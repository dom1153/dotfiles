"$schema" = 'https://starship.rs/config-schema.json'

palette = "catppuccin_mocha"

### 'pure prompt '
format = """
$username\
$hostname\
$linebreak\
$directory\
$git_branch\
$git_state\
$git_status\
$nix_shell\
$cmd_duration\
$jobs\
$status\
$line_break\
$character"""

[hostname]
ssh_symbol = "@ "
format = '[$ssh_symbol](blue)[$hostname](red) '
trim_at = '.'

[username]
style_user = 'yellow'
format = '[$user]($style) '

[directory]
style = "blue bold"

[character]
success_symbol = "[>](green bold)"
error_symbol = "[>](red bold)"
vimcmd_symbol = "[<](green bold)"

[git_branch]
format = "[$branch]($style)"
style = "subtext0"

[git_status]
format = "[[(*$conflicted$untracked$modified$staged$renamed$deleted)](218) ($ahead_behind$stashed)]($style)"
style = "cyan"
conflicted = "​"
untracked = "​"
modified = "​"
staged = "​"
renamed = "​"
deleted = "​"
stashed = "≡"

### progress for rebasing, bisecting
[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"

[cmd_duration]
format = "[$duration]($style) "
style = "yellow"

[nix_shell]
impure_msg = '[impure](red)'
pure_msg = '[pure](green)'
unknown_msg = '[unknown](yellow)'
format = '[$state( \($name\))](blue) '

[jobs]
number_threshold = 1
style = "mauve"
format = '[jobs\[$number\]]($style) '

[shlvl]
disabled = false
style = 'peach'
threshold = 2
format = '[shlvl\($shlvl\)]($style) '

[status]
style = 'red bold'
# symbol = '▲'
format = '[X $int$signal_name]($style) '
map_symbol = false
disabled = false

[time]
disabled = false
format = '[$time]($style) '
style = "subtext1"
time_format = '%T'
utc_time_offset = '-5'
# time_range = '10:00:00-14:00:00'

# palette tables should be last in the config ⚓️
[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"

# Font configuration
font:
  # Normal (roman) font face
  normal:
    family: "JetBrainsMono Nerd Font"
    family: "Monaspace Neon"
    family: "Dina"
    #family: "GohuFont uni11 Nerd Font" ### size 8
    #family: "GohuFont uni14 Nerd Font Mono"
    #style: Regular

  # Bold font face
  bold:
    family: "JetBrainsMono Nerd Font"
    family: "Monaspace Neon"
    family: "Dina" ### used
    #style: Bold

  # Italic font face
  italic:
    family: "JetBrainsMono Nerd Font"
    family: "Monaspace Neon"
    family: "Dina" ### used
    #style: Italic

  # Bold italic font face
  bold_italic:
    family: "JetBrainsMono Nerd Font"
    family: "Monaspace Neon"
    family: "Dina" ### used
    #style: Bold Italic

  # Point size
  size: 10

  # Offset
  #offset:
  #  x: 0
  #  y: 0

  # Glyph offset
  #glyph_offset:
  #  x: 0
  #  y: 0

---
services:
  dashy:
    env_file: ".env"
    volumes:
      - ${DOCKER_PERSIST}/dashy/dashy.yml:/app/user-data/conf.yml
    container_name: dashy
    restart: unless-stopped
    image: lissy93/dashy:latest
    ### network mode, defaults to 8080 if unset
    network_mode: host
    environment:
      - NODE_ENV=production
      - UID=1000
      - GID=100
      - PORT=${DASHY_PORT}
    healthcheck:
      test: ['CMD', 'node', '/app/services/healthcheck']
      interval: 1m30s
      timeout: 10s
      retries: 3
      start_period: 40s
